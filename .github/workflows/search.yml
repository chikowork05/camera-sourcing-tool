name: 仕入れハンター 自動検索

on:
  schedule:
    # 毎日 7:00, 10:00, 13:00, 16:00, 19:00, 22:00 JST に実行
    # (GitHub ActionsはUTC表記なので-9時間)
    - cron: '0 22 * * *'   # JST 7:00
    - cron: '0 1 * * *'    # JST 10:00
    - cron: '0 4 * * *'    # JST 13:00
    - cron: '0 7 * * *'    # JST 16:00
    - cron: '0 10 * * *'   # JST 19:00
    - cron: '0 13 * * *'   # JST 22:00
  workflow_dispatch:  # 手動実行ボタンも有効化

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests beautifulsoup4

      - name: 自動検索スクリプトを実行
        run: python scripts/searcher.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "変更なし、コミットをスキップします"
          else
            git commit -m "自動更新: $(date '+%Y-%m-%d %H:%M JST' --date='9 hours')"
            git push
          fi
