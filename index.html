     }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)), [data.notifications, statusF, platF, catF, search]);

              <Chip val="all" label="全カテゴリ" current={catF} setter={setCatF} />

            </div>
            <input type="text" placeholder="🔎 商品名・条件名で絞り込み..." value={search}
              onChange={e => { setSearch(e.target.value); setPage(1); }}

            {filtered.length === 0 ? (

                  <div style={{ padding:16, textAlign:'center' }}>

                      style={{ padding:'8px 24px', borderRadius:8, border:`1px solid ${AMBER}55`, color: AMBER, background:'transparent', fontSize:13, cursor:'pointer' }}>

    // ─── Condition Modal ──────────────────────────────────────────
    const CondModal = ({ cond, onClose, onSave }) => {

            </div>
          </div>
        </div>
      );

    // ─── Conditions View ──────────────────────────────────────────
    const ConditionsView = ({ data, updateData }) => {
      const [modal, setModal] = useState(null);
      const [catF, setCatF] = useState('すべて');
      const [platF, setPlatF] = useState('すべて');

      const [importMsg, setImportMsg] = useState('');
      const save = f => {
        updateData(p => modal==='new'
          ? { ...p, searchConditions: [...p.searchConditions, { ...f, id: genId() }] }
          : { ...p, searchConditions: p.searchConditions.map(c => c.id===f.id ? f : c) }
        );
        setModal(null);
      };

      const del = id => { if (!confirm('削除しますか？')) return; updateData(p => ({ ...p, searchConditions: p.searchConditions.filter(c=>c.id!==id) })); };
      const tog = id => updateData(p => ({ ...p, searchConditions: p.searchConditions.map(c => c.id===id ? {...c,enabled:!c.enabled} : c) }));

      // CSV helpers
      const csvEsc = v => {
        const s = String(v ?? '');
        return (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r'))
          ? '"' + s.replace(/"/g, '""') + '"' : s;
      };
      const exportCSV = () => {
        const headers = ['id','name','category','platform','searchUrl','criteria','enabled'];
        const rows = data.searchConditions.map(c => headers.map(h => csvEsc(h==='enabled'?String(c[h]):c[h])).join(','));
        const csv = [headers.join(','), ...rows].join('\r\n');
        const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:'text/csv;charset=utf-8'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = '仕入れ条件.csv'; a.click();
      };
      const parseCSV = text => {
        const lines = text.replace(/\r\n|\r/g,'\n').split('\n');
        const result = [];
        for (let i = 0; i < lines.length; i++) {
          const row = []; let cur = ''; let inQ = false;
          for (let j = 0; j < lines[i].length; j++) {
            const c = lines[i][j];
            if (inQ) {
              if (c==='"' && lines[i][j+1]==='"') { cur+='"'; j++; }
              else if (c==='"') inQ = false;
              else cur += c;
            } else if (c==='"') { inQ = true; }
            else if (c===',') { row.push(cur); cur=''; }
            else cur += c;
          }
          row.push(cur);
          result.push(row);
        }
        return result;
      };
      const importCSV = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            let text = ev.target.result;
            if (text.charCodeAt(0)===0xFEFF) text = text.slice(1); // BOM
            const rows = parseCSV(text).filter(r => r.some(c=>c.trim()));
            if (rows.length < 2) { setImportMsg('❌ データが見つかりません'); return; }
            const headers = rows[0].map(h=>h.trim().toLowerCase().replace(/[\s_]/g,''));
            const hIdx = k => { const aliases = {id:['id'],name:['name','displayname','display_name','名前','条件名'],category:['category','カテゴリ'],platform:['platform','プラットフォーム','媒体'],searchurl:['searchurl','search_url','url','検索url'],criteria:['criteria','prompt','判定条件','条件'],enabled:['enabled','有効']}; return (aliases[k]||[k]).map(a=>headers.findIndex(h=>h===a||h.replace(/_/g,'').includes(a))).find(i=>i>=0)??-1; };
            const iId=hIdx('id'), iName=hIdx('name'), iCat=hIdx('category'), iPlatform=hIdx('platform'), iUrl=hIdx('searchurl'), iCriteria=hIdx('criteria'), iEnabled=hIdx('enabled');
            if (iName<0||iUrl<0) { setImportMsg('❌ name/searchUrl列が見つかりません'); return; }
            let added=0, updated=0;
            updateData(p => {
              let conds = [...p.searchConditions];
              rows.slice(1).forEach(row => {
                if (!row[iUrl]?.trim()) return;
                const rowId = iId>=0 ? row[iId].trim() : '';
                const existing = rowId ? conds.find(c=>c.id===rowId) : conds.find(c=>c.name===row[iName]?.trim());
                const obj = {
                  id: existing?.id || rowId || genId(),
                  name: (iName>=0?row[iName]:'').trim() || existing?.name || '',
                  category: (iCat>=0?row[iCat]:'').trim() || existing?.category || 'フィルムカメラ',
                  platform: (() => { const pv = (iPlatform>=0?row[iPlatform]:'').trim(); if (pv) return pv; if (existing?.platform) return existing.platform; const u = (iUrl>=0?row[iUrl]:''); return u.includes('mercari') ? 'メルカリ' : 'ヤフオク'; })(),
                  searchUrl: (iUrl>=0?row[iUrl]:'').trim(),
                  criteria: (iCriteria>=0?row[iCriteria]:'').trim() || existing?.criteria || '',
                  enabled: iEnabled>=0 ? row[iEnabled].trim().toLowerCase()!=='false' : (existing?.enabled ?? true),
                };
                if (existing) { conds = conds.map(c=>c.id===obj.id?obj:c); updated++; }
                else { conds.push(obj); added++; }
              });
              setImportMsg(`✅ ${added}件追加・${updated}件更新しました`);
              setTimeout(()=>setImportMsg(''), 4000);
              return { ...p, searchConditions: conds };
            });
          } catch(err) { setImportMsg('❌ 読み込みエラー: '+err.message); }
          e.target.value='';
        };
        reader.readAsText(file, 'UTF-8');
      };

      const filtered = data.searchConditions.filter(c =>
        (catF==='すべて'||c.category===catF) && (platF==='すべて'||c.platform===platF)
      );

      const Chip = ({ val, current, setter }) => (
        <button onClick={()=>setter(val)} style={{
          padding:'5px 12px', borderRadius:20, fontSize:12, cursor:'pointer', border:'1px solid',
          background: current===val ? AMBER+'22' : 'transparent',
          borderColor: current===val ? AMBER+'88' : '#333',
          color: current===val ? AMBER_LIGHT : '#666'
        }}>{val}</button>
      );

      return (
        <div className="p-4 md:p-6 max-w-4xl fade-in">
          <div className="flex items-center justify-between mb-5">
            <div>
              <h2 className="text-xl font-bold" style={{ color:'#f0e6d0' }}>検索条件</h2>
              <p style={{ color:'#666', fontSize:12, marginTop:4 }}>有効: {data.searchConditions.filter(c=>c.enabled).length}件 / {data.searchConditions.length}件</p>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
              <label style={{ background:'#1e2d1e', color:'#4ade80', padding:'7px 14px', borderRadius:8, fontSize:12, fontWeight:600, border:'1px solid #2d4d2d', cursor:'pointer', whiteSpace:'nowrap' }}>
                📥 CSVインポート
                <input type="file" accept=".csv,text/csv" style={{ display:'none' }} onChange={importCSV} />
              </label>
              <button onClick={exportCSV} style={{ background:'#1e2020', color:'#67e8f9', padding:'7px 14px', borderRadius:8, fontSize:12, fontWeight:600, border:'1px solid #1e3a3a', cursor:'pointer', whiteSpace:'nowrap' }}>
                📤 CSVエクスポート
              </button>
              <button onClick={()=>setModal('new')} style={{ background: AMBER, color:'#000', padding:'7px 14px', borderRadius:8, fontSize:13, fontWeight:700, border:'none', cursor:'pointer', whiteSpace:'nowrap' }}>
                ＋ 新規追加
              </button>
            </div>
          </div>

          <div className="flex flex-wrap gap-2 mb-4 items-center">
            <span style={{ color:'#555', fontSize:12 }}>カテゴリ:</span>
            {['すべて',...CATEGORIES].map(c=><Chip key={c} val={c} current={catF} setter={setCatF}/>)}
            <span style={{ color:'#444', fontSize:12, marginLeft:8 }}>媒体:</span>
            {['すべて',...PLATFORMS].map(p=><Chip key={p} val={p} current={platF} setter={setPlatF}/>)}
          </div>

          {importMsg && <div style={{ marginBottom:12, padding:'10px 14px', borderRadius:8, background:'rgba(0,0,0,0.3)', border:'1px solid #333', color:'#aaa', fontSize:13 }}>{importMsg}</div>}
          <div style={{ background:'#1a1a1a', border:'1px solid #2a2a2a', borderRadius:14, overflow:'hidden' }}>
            {filtered.length === 0 ? (
              <div style={{ padding:60, textAlign:'center' }}>
                <p style={{ fontSize:40, marginBottom:12 }}>🔍</p>
                <p style={{ color:'#555', marginBottom:16 }}>検索条件がありません</p>
                <button onClick={()=>setModal('new')} style={{ background: AMBER, color:'#000', padding:'8px 18px', borderRadius:8, fontSize:13, fontWeight:700, border:'none', cursor:'pointer' }}>追加する</button>
              </div>
            ) : filtered.map(c => (
              <div key={c.id} className="noti-card" style={{ padding:'14px 18px' }}>
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <p style={{ color:'#e0d0c0', fontSize:13, fontWeight:600, marginBottom:6 }}>{c.name}</p>
                    <div className="flex flex-wrap gap-1.5 mb-2">
                      <Tag t={c.category} color={C_COLOR[c.category]||'#666'} />
                      <Tag t={c.platform} color={P_COLOR[c.platform]||'#666'} />
                      {!c.enabled && <Tag t="無効" color="#555" />}
                    </div>
                    {c.criteria && <p style={{ color:'#555', fontSize:11 }} className="line-clamp-2">{c.criteria.replace(/\n/g,' ')}</p>}
                  </div>
                  <div className="flex items-center gap-3" style={{ flexShrink:0 }}>
                    <Toggle checked={c.enabled} onChange={()=>tog(c.id)} />
                    <button onClick={()=>setModal(c)} style={{ color: AMBER, fontSize:13, background:'none', border:'none', cursor:'pointer', fontWeight:600 }}>編集</button>
                    <button onClick={()=>del(c.id)} style={{ color:'#f87171', fontSize:13, background:'none', border:'none', cursor:'pointer' }}>削除</button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {modal && <CondModal cond={modal==='new'?null:modal} onClose={()=>setModal(null)} onSave={save} />}
        </div>
      );
    };

    // ─── Settings ─────────────────────────────────────────────────
    const SettingsView = ({ data, updateData }) => {
      const [txt, setTxt] = useState('');
      const [msg, setMsg] = useState('');

      const exportAll = () => {
        const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `仕入れデータ_${new Date().toISOString().slice(0,10)}.json`; a.click();
      };

      const doImport = () => {
        try {
          const parsed = JSON.parse(txt);
          if (parsed.notifications) {
            const ids = new Set(data.notifications.map(n=>n.id));
            const newN = parsed.notifications.filter(n=>!ids.has(n.id));
            updateData(p=>({...p,notifications:[...newN,...p.notifications]}));
            setMsg(`✅ ${newN.length}件インポートしました。`);
          } else if (parsed.searchConditions) {
            updateData(p=>({...p,searchConditions:[...p.searchConditions,...parsed.searchConditions.map(c=>({...c,id:genId()}))]}));
            setMsg(`✅ ${parsed.searchConditions.length}件の条件をインポートしました。`);
          } else setMsg('❌ 不正なデータ形式です。');
          setTxt('');
        } catch { setMsg('❌ JSONのパースに失敗しました。'); }
      };

      const boxStyle = { background:'#1a1a1a', border:'1px solid #2a2a2a', borderRadius:14, padding:20, marginBottom:16 };
      const inpStyle = { width:'100%', padding:'9px 12px', borderRadius:8, background:'#111', border:'1px solid #333', color:'#ccc', fontSize:13, outline:'none' };
      const btnStyle = (primary) => ({ padding:'8px 18px', borderRadius:8, border: primary ? 'none' : `1px solid ${AMBER}55`, background: primary ? AMBER : 'transparent', color: primary ? '#000' : AMBER, fontSize:13, fontWeight:700, cursor:'pointer' });

      return (
        <div className="p-4 md:p-6 max-w-2xl fade-in">
          <h2 className="text-xl font-bold mb-5" style={{ color:'#f0e6d0' }}>設定</h2>

          <div style={boxStyle}>
            <p style={{ color:'#f0e6d0', fontWeight:600, fontSize:14, marginBottom:8 }}>📤 エクスポート</p>
            <p style={{ color:'#666', fontSize:12, marginBottom:14 }}>検索条件・通知データをJSONファイルとして保存します。</p>
            <div className="flex gap-3 flex-wrap">
              <button onClick={exportAll} style={btnStyle(false)}>全データをエクスポート</button>
              <button onClick={() => { const blob = new Blob([JSON.stringify({searchConditions:data.searchConditions},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`検索条件_${new Date().toISOString().slice(0,10)}.json`; a.click(); }} style={btnStyle(false)}>検索条件のみ</button>
            </div>
          </div>

          <div style={boxStyle}>
            <p style={{ color:'#f0e6d0', fontWeight:600, fontSize:14, marginBottom:8 }}>📥 インポート</p>
            <p style={{ color:'#666', fontSize:12, marginBottom:12 }}>自動巡回タスクの結果JSONを貼り付けてインポートできます。</p>
            <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={5} placeholder='{"notifications": [...]}' style={{...inpStyle, resize:'none', marginBottom:10}} />
            {msg && <p style={{ color: msg.startsWith('✅')?'#4ade80':'#f87171', fontSize:12, marginBottom:10 }}>{msg}</p>}
            <button onClick={doImport} disabled={!txt.trim()} style={{...btnStyle(true), opacity: txt.trim()?1:0.4 }}>インポート実行</button>
          </div>

          <div style={{...boxStyle, border:'1px solid #4a2020' }}>
            <p style={{ color:'#f87171', fontWeight:600, fontSize:14, marginBottom:8 }}>⚠️ 危険な操作</p>
            <div className="flex items-center justify-between">
              <div>
                <p style={{ color:'#e0d0c0', fontSize:13 }}>通知履歴を全削除</p>
                <p style={{ color:'#555', fontSize:11 }}>検索条件は保持されます</p>
              </div>
              <button onClick={() => { if(confirm('全通知を削除しますか？')) updateData(p=>({...p,notifications:[]})); }}
                style={{ padding:'8px 16px', borderRadius:8, background:'rgba(248,113,113,0.15)', border:'1px solid #f8717155', color:'#f87171', fontSize:13, cursor:'pointer' }}>
                履歴を削除
              </button>
            </div>
          </div>

          <p style={{ color:'#444', fontSize:12, textAlign:'center', marginTop:16 }}>
            仕入れハンター v1.0 | 最終更新: {data.lastUpdated ? new Date(data.lastUpdated).toLocaleString('ja-JP') : '未設定'}
          </p>
        </div>
      );
    };

    // ─── App ──────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState('dashboard');
      const [data, setData] = useState(() => loadData());

      useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {} }, [data]);

      const updateData = useCallback(updater => {
        setData(prev => {
          const next = typeof updater==='function' ? updater(prev) : updater;
          return { ...next, lastUpdated: new Date().toISOString() };
        });
      }, []);

      const unread = data.notifications.filter(n=>!n.isRead).length;

      return (
        <div style={{ display:'flex', background:'#111', color:'#ccc', minHeight:'100vh' }}>
          <Sidebar view={view} setView={setView} unread={unread} />
          <main style={{ flex:1, paddingBottom:80 }} className="md:ml-56 md:pb-6">
            {view==='dashboard' && <Dashboard data={data} setView={setView} />}
            {view==='notifications' && <NotificationsView data={data} updateData={updateData} />}
            {view==='conditions' && <ConditionsView data={data} updateData={updateData} />}
            {view==='settings' && <SettingsView data={data} updateData={updateData} />}
          </main>
          <BottomNav view={view} setView={setView} unread={unread} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
